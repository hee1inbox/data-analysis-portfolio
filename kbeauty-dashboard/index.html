<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K-Beauty Market Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#06080e;--s1:#0c1220;--s2:#111928;
      --border:rgba(255,255,255,0.07);--text:#dde4f5;--dim:#5a6480;
      --pink:#ff3d8a;--cyan:#00c8e0;--purple:#7c5cfc;--amber:#ffb340;--green:#00e59a;
    }
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;display:flex;flex-direction:column}
    /* HEADER */
    header{flex-shrink:0;background:linear-gradient(180deg,rgba(255,61,138,.08) 0%,var(--s1) 100%);border-bottom:1px solid var(--border);padding:0 22px}
    .hd-top{display:flex;align-items:center;justify-content:space-between;padding:12px 0 6px}
    .brand h1{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.04em;background:linear-gradient(110deg,var(--pink) 0%,var(--cyan) 55%,var(--purple) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .brand p{font-size:12px;font-weight:700;color:#a0b0cc;margin-top:3px}
    .country-nav{display:flex;gap:4px;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:4px}
    .cnav{padding:8px 20px;border-radius:7px;border:none;background:transparent;color:var(--dim);font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap}
    .cnav:hover{color:var(--text);background:rgba(255,255,255,.05)}
    .cnav.active{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff}
    .breadcrumb{display:flex;align-items:center;gap:6px;padding:4px 0 8px;font-size:12px;color:var(--dim)}
    .bc-item{color:var(--text);font-weight:600}
    /* LAYOUT */
    .layout{flex:1;display:flex;overflow:hidden}
    /* LEFT */
    .left-panel{width:230px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .panel-sect{padding:12px 14px 8px;font-size:13px;font-weight:700;color:var(--text);border-bottom:1px solid var(--border);flex-shrink:0}
    .cat-area{padding:8px 10px;flex-shrink:0}
    .cat-btn{display:block;width:100%;text-align:left;padding:7px 10px;border-radius:7px;border:none;background:transparent;color:var(--dim);font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;margin-bottom:2px}
    .cat-btn:hover{background:rgba(255,255,255,.05);color:var(--text)}
    .cat-btn.active{background:rgba(255,61,138,.12);border-left:2px solid var(--pink);color:var(--text);font-weight:700}
    .product-area{flex:1;overflow-y:auto;padding:6px 10px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
    .product-item{padding:8px 10px;border-radius:7px;cursor:pointer;font-size:12px;color:var(--dim);transition:all .15s;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:2px solid transparent}
    .product-item:hover{background:rgba(255,255,255,.04);color:var(--text)}
    .product-item.active{background:rgba(0,200,224,.1);border-left-color:var(--cyan);color:var(--cyan);font-weight:600}
    .loading-list{padding:16px 10px;color:var(--dim);font-size:12px;text-align:center}
    /* CENTER */
    .center-panel{flex:1;overflow-y:auto;padding:22px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
    .center-empty{min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--dim);padding:40px}
    .center-empty .icon{font-size:44px}
    .center-empty .main-txt{font-size:16px;font-weight:700;color:var(--text)}
    .center-empty .sub-txt{font-size:13px;text-align:center;line-height:1.7}
    .score-display{animation:fadeUp .4s ease}
    .score-header{margin-bottom:18px}
    .score-header .product-name{font-size:17px;font-weight:700;margin-bottom:6px}
    .country-tag{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;background:rgba(0,200,224,.12);border:1px solid rgba(0,200,224,.25);color:var(--cyan)}
    .gauge-section{display:flex;align-items:center;gap:32px;background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:24px 28px;margin-bottom:18px}
    .gauge-wrap{position:relative;width:160px;height:160px;flex-shrink:0}
    .gauge-wrap svg{width:160px;height:160px}
    .gauge-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .gauge-score{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:1}
    .gauge-unit{font-size:12px;color:var(--dim);margin-top:2px}
    .gauge-info{flex:1}
    .entry-label-big{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.04em;margin-bottom:10px}
    .prob-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .prob-bar-wrap{flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
    .prob-bar{height:100%;border-radius:3px;transition:width 1s ease}
    .prob-label{font-size:13px;color:var(--dim);white-space:nowrap}
    .prob-pct{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;white-space:nowrap}
    .insight-tag{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700}
    .tag-high{background:rgba(0,229,154,.12);color:var(--green);border:1px solid rgba(0,229,154,.25)}
    .tag-medium{background:rgba(255,179,64,.12);color:var(--amber);border:1px solid rgba(255,179,64,.25)}
    .tag-low{background:rgba(255,61,138,.12);color:var(--pink);border:1px solid rgba(255,61,138,.25)}
    .no-score-card{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:36px;text-align:center;color:var(--dim)}
    .bottom-area{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:4px}
    .chart-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:18px}
    .chart-head{display:flex;align-items:center;gap:8px;margin-bottom:14px}
    .chart-dot{width:8px;height:8px;border-radius:50%}
    .chart-head-title{font-size:14px;font-weight:700}
    .chart-inner{height:210px;position:relative}
    /* RIGHT */
    .right-panel{width:248px;flex-shrink:0;background:var(--s1);border-left:1px solid var(--border);overflow-y:auto;padding:16px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
    .right-section-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
    .r-country-card{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
    .r-country-card:hover{border-color:rgba(255,61,138,.3);transform:translateY(-1px)}
    .r-country-card.selected{border-color:var(--cyan);background:rgba(0,200,224,.07)}
    .r-country-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:4px}
    .r-country-card.c-USA::before{background:#3b82f6}
    .r-country-card.c-PL::before{background:#ef4444}
    .r-country-card.c-VN::before{background:#f59e0b}
    .r-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
    .r-card-left{display:flex;flex-direction:column;gap:2px}
    .r-card-flag{font-size:18px}
    .r-card-name{font-size:15px;font-weight:700;color:var(--text)}
    .r-score{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1}
    .r-bar-wrap{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:8px}
    .r-bar{height:100%;border-radius:2px;transition:width 1s ease}
    .r-label{font-size:12px;font-weight:600;margin-top:6px}
    .avg-card{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
    .avg-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .avg-card-name{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700}
    .avg-score{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1}
    .avg-sub{font-size:10px;color:var(--dim);margin-top:3px}
    .kpi-mini{display:flex;flex-direction:column;gap:8px;margin-top:4px}
    .kpi-m{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
    .kpi-m-label{font-size:12px;color:var(--dim);margin-bottom:4px;font-weight:500}
    .kpi-m-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.02em}
    .kpi-m:nth-child(1) .kpi-m-val{color:var(--pink)}
    .kpi-m:nth-child(2) .kpi-m-val{color:var(--cyan)}
    .kpi-m:nth-child(3) .kpi-m-val{color:var(--purple)}
    .right-empty{padding:14px 4px;text-align:center;color:var(--dim);font-size:13px;line-height:1.7}
    /* CHATBOT */
    .chat-fab{position:fixed;bottom:22px;right:22px;width:48px;height:48px;background:linear-gradient(135deg,var(--pink),var(--purple));border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:500;box-shadow:0 4px 20px rgba(255,61,138,.55);transition:transform .2s}
    .chat-fab:hover{transform:scale(1.1)}
    .chat-fab svg{width:20px;height:20px;fill:white}
    .chat-panel{position:fixed;bottom:80px;right:22px;width:330px;height:460px;background:var(--s2);border:1px solid rgba(255,61,138,.2);border-radius:16px;display:flex;flex-direction:column;z-index:499;overflow:hidden;box-shadow:0 16px 60px rgba(0,0,0,.8);transform:scale(.95) translateY(10px);opacity:0;pointer-events:none;transition:all .2s cubic-bezier(.34,1.56,.64,1)}
    .chat-panel.open{transform:scale(1) translateY(0);opacity:1;pointer-events:all}
    .chat-hd{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(255,61,138,.07),rgba(124,92,252,.07));flex-shrink:0}
    .chat-avatar{width:28px;height:28px;background:linear-gradient(135deg,var(--pink),var(--purple));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px}
    .chat-hd-t{font-size:13px;font-weight:600}.chat-hd-s{font-size:10px;color:var(--dim)}
    .chat-msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin}
    .msg{display:flex;flex-direction:column;max-width:88%}
    .msg.user{align-self:flex-end;align-items:flex-end}.msg.bot{align-self:flex-start;align-items:flex-start}
    .msg-bbl{padding:8px 11px;border-radius:10px;font-size:12px;line-height:1.55}
    .msg.user .msg-bbl{background:linear-gradient(135deg,rgba(255,61,138,.18),rgba(124,92,252,.18));border:1px solid rgba(255,61,138,.2)}
    .msg.bot .msg-bbl{background:var(--s1);border:1px solid var(--border)}
    .msg-ts{font-family:'Space Mono',monospace;font-size:9px;color:var(--dim);margin-top:3px}
    .chat-inp-row{padding:8px;border-top:1px solid var(--border);display:flex;gap:7px;flex-shrink:0}
    .chat-inp{flex:1;background:var(--s1);border:1px solid var(--border);border-radius:7px;padding:8px 11px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:12px;outline:none;resize:none;height:36px}
    .chat-inp:focus{border-color:rgba(255,61,138,.4)}
    .chat-send{width:36px;height:36px;flex-shrink:0;background:linear-gradient(135deg,var(--pink),var(--purple));border:none;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .chat-send svg{width:13px;height:13px;fill:white}
    .typing{display:flex;gap:4px;padding:2px}
    .typing span{width:5px;height:5px;background:var(--dim);border-radius:50%;animation:bounce 1.2s ease-in-out infinite}
    .typing span:nth-child(2){animation-delay:.14s}.typing span:nth-child(3){animation-delay:.28s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
  </style>
</head>
<body>
<header>
  <div class="hd-top">
    <div class="brand">
      <h1>K-BEAUTY MARKET INTELLIGENCE</h1>
      <p>한국 뷰티 제품 수출 시장 분석 대시보드 · MySQL · AI</p>
    </div>
    <nav class="country-nav" id="country-nav">
      <button class="cnav active" data-c="USA">🇺🇸 미국</button>
      <button class="cnav"        data-c="PL">🇵🇱 폴란드</button>
      <button class="cnav"        data-c="VN">🇻🇳 베트남</button>
    </nav>
  </div>
  <div class="breadcrumb">
    <span class="bc-item">한국 제품</span>
    <span id="bc-sep"  style="display:none"> › </span>
    <span class="bc-item" id="bc-cat"  style="display:none"></span>
    <span id="bc-sep2" style="display:none"> › </span>
    <span class="bc-item" id="bc-prod" style="display:none"></span>
  </div>
</header>

<div class="layout">
  <aside class="left-panel">
    <div class="panel-sect">제품 카테고리</div>
    <div class="cat-area" id="cat-area">
      <button class="cat-btn active" data-type="all" id="cat-all">전체</button>
    </div>
    <div class="panel-sect">한국 상품 목록</div>
    <div class="product-area" id="product-area">
      <div class="loading-list">로딩 중...</div>
    </div>
  </aside>

  <section class="center-panel" id="center-panel"></section>

  <aside class="right-panel">
    <div class="right-section-title">선택 상품 — 국가별 진입 점수</div>
    <div id="r-entry-area"><div class="right-empty">좌측에서 상품을<br>선택하면 표시됩니다</div></div>
    <div class="right-section-title" style="margin-top:18px">전체 평균 진입 점수</div>
    <div id="r-avg-area"><div class="loading-list">로딩 중...</div></div>
    <div class="right-section-title" style="margin-top:18px" id="kpi-title">선택 국가 통계</div>
    <div class="kpi-mini">
      <div class="kpi-m"><div class="kpi-m-label">제품 수</div><div class="kpi-m-val" id="kpi-total">—</div></div>
      <div class="kpi-m"><div class="kpi-m-label">평균 평점</div><div class="kpi-m-val" id="kpi-rating">—</div></div>
      <div class="kpi-m"><div class="kpi-m-label">평균 리뷰 수</div><div class="kpi-m-val" id="kpi-reviews">—</div></div>
    </div>
  </aside>
</div>

<button class="chat-fab" id="chat-fab"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
<div class="chat-panel" id="chat-panel">
  <div class="chat-hd"><div class="chat-avatar">🧴</div><div><div class="chat-hd-t">K-Beauty 수출 AI</div><div class="chat-hd-s">Powered by OpenAI</div></div></div>
  <div class="chat-msgs" id="chat-msgs">
    <div class="msg bot"><div class="msg-bbl">안녕하세요! 좌측에서 한국 상품을 선택하면 어느 나라에 수출하면 좋을지 분석해 드릴게요 🌏</div><div class="msg-ts">지금</div></div>
  </div>
  <div class="chat-inp-row">
    <textarea class="chat-inp" id="chat-inp" placeholder="수출 전략 질문…" rows="1"></textarea>
    <button class="chat-send" id="chat-send"><svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
  </div>
</div>

<script>
'use strict';
const API = 'http://localhost:3001';
const CHARTS = {};
Chart.defaults.color = '#5a6480';
Chart.defaults.borderColor = 'rgba(255,255,255,0.05)';
Chart.defaults.font.family = "'Space Mono',monospace";
Chart.defaults.font.size = 11;

const CINFO = {
  USA: { name:'미국',   flag:'🇺🇸' },
  PL:  { name:'폴란드', flag:'🇵🇱' },
  VN:  { name:'베트남', flag:'🇻🇳' },
};

// 상태값
let ST = {
  country: 'USA',
  category: 'all',
  productId: '',
  productName: '',
  entryScores: [],
  sentData: [],
  catData: []
};

const sColor = s => s >= 70 ? '#00e59a' : s >= 40 ? '#ffb340' : '#ff3d8a';
const sLabel = (l, s) => l || (s >= 80 ? 'Very Likely' : s >= 60 ? 'Likely' : s >= 40 ? 'Possible' : 'Low');
const tClass = s => s >= 70 ? 'tag-high' : s >= 40 ? 'tag-medium' : 'tag-low';

/* ── 하단 차트 HTML ── */
function bottomHTML() {
  const ci = CINFO[ST.country] || CINFO.USA;
  
  return `<div class="bottom-area" style="margin-top:20px">
    <div class="chart-card">
      <div class="chart-head"><span class="chart-dot" style="background:#00e59a"></span>
        <span class="chart-head-title">감성 분석 — ${ci.flag} ${ci.name}</span></div>
      <div class="chart-inner"><canvas id="chart-sentiment"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-head"><span class="chart-dot" style="background:#7c5cfc"></span>
        <span class="chart-head-title">카테고리별 제품 수 — ${ci.flag} ${ci.name}</span></div>
      <div class="chart-inner"><canvas id="chart-category"></canvas></div>
    </div>
  </div>`;
}

/* ── 차트 렌더 ── */
function renderCharts() {
  const PAL = ['#ff3d8a','#00c8e0','#7c5cfc','#ffb340','#00e59a','#ff5555','#ff9000','#00b4ff'];
  const cs = document.getElementById('chart-sentiment');
  const cc = document.getElementById('chart-category');

  if (cs && ST.sentData.length) {
    if (CHARTS.s) { CHARTS.s.destroy(); delete CHARTS.s; }
    const CM = { '긍정':'#00e59a', '부정':'#ff3d8a', '중립':'#ffb340' };
    const total = ST.sentData.reduce((a, d) => a + d.cnt, 0);
    CHARTS.s = new Chart(cs.getContext('2d'), {
      type: 'doughnut',
      data: {
        labels: ST.sentData.map(d => d.label),
        datasets: [{ data: ST.sentData.map(d => d.cnt),
          backgroundColor: ST.sentData.map(d => CM[d.label] || '#7c5cfc'),
          borderColor: '#111928', borderWidth: 3, hoverOffset: 6 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '65%',
        plugins: {
          legend: { position:'bottom', labels:{ padding:12, usePointStyle:true, pointStyleWidth:7, color:'#dde4f5', font:{size:11} } },
          tooltip: { callbacks: { label: ctx => `${ctx.label}: ${ctx.parsed.toLocaleString()}건 (${((ctx.parsed/total)*100).toFixed(1)}%)` } }
        }
      }
    });
  }

  if (cc && ST.catData.length) {
    if (CHARTS.c) { CHARTS.c.destroy(); delete CHARTS.c; }
    CHARTS.c = new Chart(cc.getContext('2d'), {
      type: 'bar',
      data: {
        labels: ST.catData.map(d => d.category),
        datasets: [{ data: ST.catData.map(d => d.cnt),
          backgroundColor: PAL.map(c => c + 'bb'),
          borderColor: PAL, borderWidth: 1, borderRadius: 5 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid:{ display:false }, ticks:{ color:'#c8d0e8', font:{size:10}, maxRotation:30 } },
          y: { grid:{ color:'rgba(255,255,255,.04)' }, ticks:{ color:'#5a6480' } }
        }
      }
    });
  }
}

/* ── 센터 패널 ── */
function setupCenter() {
  document.getElementById('center-panel').innerHTML =
    `<div class="center-empty">
      <div class="icon">🌏</div>
      <div class="main-txt">한국 상품을 선택해주세요</div>
      <div class="sub-txt">좌측에서 상품을 클릭하면<br>국가별 시장 진입 점수가 표시됩니다</div>
    </div>${bottomHTML()}`;
  setTimeout(renderCharts, 50);
}

function updateCenter() {
  const cp = document.getElementById('center-panel');
  const ci = CINFO[ST.country];
  const found = ST.entryScores.find(d => d.target_country === ST.country);

  if (!ST.productId) { setupCenter(); return; }

  if (!found) {
    cp.innerHTML = `<div class="score-display">
      <div class="score-header">
        <div class="product-name">${esc(ST.productName)}</div>
        <span class="country-tag">${ci.flag} ${ci.name} 시장</span>
      </div>
      <div class="no-score-card">
        <div style="font-size:30px;margin-bottom:10px">📭</div>
        <p style="font-size:14px">이 상품의 ${ci.name} 예측 데이터가 없습니다.</p>
      </div>
    </div>${bottomHTML()}`;
    setTimeout(renderCharts, 50);
    return;
  }

  const score = found.market_entry_score;
  const prob  = found.top100_proba != null ? Math.round(found.top100_proba) : score;
  const label = sLabel(found.market_entry_label, score);
  const color = sColor(score);
  const circ  = 2 * Math.PI * 73;
  const offset = circ * (1 - score / 100);

  cp.innerHTML = `<div class="score-display">
    <div class="score-header">
      <div class="product-name">${esc(ST.productName)}</div>
      <span class="country-tag">${ci.flag} ${ci.name} 시장 분석</span>
    </div>
    <div class="gauge-section">
      <div class="gauge-wrap">
        <svg viewBox="0 0 160 160">
          <circle cx="80" cy="80" r="73" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="12"/>
          <circle cx="80" cy="80" r="73" fill="none" stroke="${color}" stroke-width="12"
            stroke-linecap="round"
            stroke-dasharray="${circ.toFixed(1)}"
            stroke-dashoffset="${offset.toFixed(1)}"
            transform="rotate(-90 80 80)"
            style="transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)"/>
        </svg>
        <div class="gauge-center">
          <div class="gauge-score" style="color:${color}">${score}</div>
          <div class="gauge-unit">/ 100점</div>
        </div>
      </div>
      <div class="gauge-info">
        <div class="entry-label-big" style="color:${color}">${label.toUpperCase()}</div>
        <div class="prob-row">
          <div class="prob-label">TOP 100 진입 확률</div>
          <div class="prob-pct" style="color:${color}">${prob}%</div>
        </div>
        <div class="prob-bar-wrap">
          <div class="prob-bar" style="width:${prob}%;background:${color}"></div>
        </div>
        <div style="margin-top:14px">
          <span class="insight-tag ${tClass(score)}">
            ${score >= 70 ? '✅ 수출 강력 추천' : score >= 40 ? '⚠️ 조건부 추천' : '❌ 추가 분석 필요'}
          </span>
        </div>
      </div>
    </div>
  </div>${bottomHTML()}`;
  setTimeout(renderCharts, 50);
}

/* ── 우측: 선택 상품 국가별 점수 ── */
function renderEntryScores(data) {
  const area = document.getElementById('r-entry-area');
  if (!data || !data.length) {
    area.innerHTML = '<div class="right-empty">이 상품의<br>예측 데이터가 없습니다</div>';
    return;
  }
  area.innerHTML = ['USA','PL','VN'].map(code => {
    const f     = data.find(d => d.target_country === code);
    const info  = CINFO[code];
    const score = f ? f.market_entry_score : null;
    const color = score != null ? sColor(score) : '#5a6480';
    const label = f ? sLabel(f.market_entry_label, score) : '—';
    return `<div class="r-country-card c-${code}${code === ST.country ? ' selected' : ''}" onclick="selectCountry('${code}')">
      <div class="r-card-top">
        <div class="r-card-left"><div class="r-card-flag">${info.flag}</div><div class="r-card-name">${info.name}</div></div>
        <div class="r-score" style="color:${color}">${score ?? '—'}</div>
      </div>
      <div class="r-bar-wrap"><div class="r-bar" style="width:${score ?? 0}%;background:${color}"></div></div>
      <div class="r-label" style="color:${color}">${label}</div>
    </div>`;
  }).join('');
}

/* ── 우측: 전체 평균 점수 ── */
function renderCountryAvg(data) {
  const area = document.getElementById('r-avg-area');
  if (!data || !data.length) { area.innerHTML = '<div class="loading-list">데이터 없음</div>'; return; }
  area.innerHTML = data.map(d => {
    const info  = CINFO[d.target_country] || { name: d.target_country, flag:'🌐' };
    const color = sColor(d.avg_score);
    return `<div class="avg-card">
      <div class="avg-card-top">
        <div class="avg-card-name">${info.flag} ${info.name}</div>
        <div class="avg-score" style="color:${color}">${d.avg_score}</div>
      </div>
      <div class="r-bar-wrap"><div class="r-bar" style="width:${d.avg_score}%;background:${color}"></div></div>
      <div class="avg-sub">Very Likely 제품 수: ${d.very_likely_cnt}개</div>
    </div>`;
  }).join('');
}

function selectCountry(code) {
  ST.country = code;
  document.querySelectorAll('.cnav').forEach(b => b.classList.toggle('active', b.dataset.c === code));
  document.getElementById('kpi-title').textContent = `${CINFO[code].flag} ${CINFO[code].name} 통계`;
  loadDashboard();
  document.querySelectorAll('.r-country-card').forEach(el =>
    el.classList.toggle('selected', el.classList.contains(`c-${code}`))
  );
}

/* ── 카테고리/상품 ── */
async function loadTypes() {
  // 전체 버튼 이벤트
  document.getElementById('cat-all').onclick = () => onCatClick('all');
  try {
    const data = await (await fetch(`${API}/api/product-types`)).json();
    const area = document.getElementById('cat-area');
    data.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn';
      btn.dataset.type = t;
      btn.textContent = t;
      btn.onclick = () => onCatClick(t);
      area.appendChild(btn);
    });
  } catch(e) { console.error(e); }
}

function onCatClick(type) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  const target = document.querySelector(`.cat-btn[data-type="${type}"]`) ||
                 document.getElementById('cat-all');
  if (target) target.classList.add('active');
  ST.category  = type;
  ST.productId   = '';
  ST.productName = '';
  bc();
  loadProducts(type);
  loadDashboard();
  document.getElementById('r-entry-area').innerHTML =
    '<div class="right-empty">좌측에서 상품을<br>선택하면 표시됩니다</div>';
}

async function loadProducts(type) {
  const area = document.getElementById('product-area');
  area.innerHTML = '<div class="loading-list">로딩 중...</div>';
  try {
    const data = await (await fetch(`${API}/api/products?type=${type}`)).json();
    area.innerHTML = '';
    if (!data.length) { area.innerHTML = '<div class="loading-list">상품 없음</div>'; return; }
    data.forEach(p => {
      const el = document.createElement('div');
      el.className = 'product-item';
      el.title = p.product_name || p.product_id;
      el.textContent = p.product_name || p.product_id;
      el.onclick = () => onProductClick(p, el);
      area.appendChild(el);
    });
  } catch(e) { area.innerHTML = '<div class="loading-list">오류 발생</div>'; }
}

async function onProductClick(product, el) {
  document.querySelectorAll('.product-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  ST.productId   = product.product_id;
  ST.productName = product.product_name || product.product_id;
  bc();
  await loadDashboard();
}

/* ── 대시보드 데이터 ── */
async function loadDashboard() {
  try {
    const url = `${API}/api/dashboard?country=${ST.country}&product_id=${ST.productId}`;
    const data = await (await fetch(url)).json();
    if (data.error) throw new Error(data.error);

    ctr('kpi-total',   data.stats.total_products);
    ctr('kpi-rating',  data.stats.avg_rating, 1);
    ctr('kpi-reviews', Math.round(data.stats.avg_reviews || 0));

    ST.entryScores = data.entryScores   || [];
    ST.sentData    = data.sentiment     || [];
    ST.catData     = data.categoryStats || [];

    if (ST.productId) {
      updateCenter();
      renderEntryScores(ST.entryScores);
    } else {
      setupCenter();
    }
    renderCountryAvg(data.countryAvg || []);

  } catch(e) { console.error('Dashboard err:', e); }
}

/* ── 유틸 ── */
function bc() {
  const sep  = document.getElementById('bc-sep');
  const cat  = document.getElementById('bc-cat');
  const sep2 = document.getElementById('bc-sep2');
  const prod = document.getElementById('bc-prod');
  if (ST.category !== 'all') { sep.style.display=''; cat.style.display=''; cat.textContent = ST.category; }
  else { sep.style.display='none'; cat.style.display='none'; }
  if (ST.productName) { sep2.style.display=''; prod.style.display=''; prod.textContent = trim(ST.productName, 28); }
  else { sep2.style.display='none'; prod.style.display='none'; }
}

function ctr(id, target, dec=0) {
  const el = document.getElementById(id);
  if (!el || target == null) return;
  const t0 = performance.now(), dur = 600;
  function step(now) {
    const p = Math.min((now - t0) / dur, 1);
    const e = 1 - Math.pow(1 - p, 3);
    const v = target * e;
    el.textContent = dec > 0 ? v.toFixed(dec) : Math.round(v).toLocaleString();
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function trim(s, n) { return s && s.length > n ? s.slice(0, n-1) + '…' : (s || ''); }

/* ── 챗봇 ── */
let chatHistory = [];
async function sendChat() {
  const inp = document.getElementById('chat-inp'), text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  addMsg('user', text);
  chatHistory.push({ role:'user', content:text });
  const send = document.getElementById('chat-send');
  send.disabled = true;
  const typing = addTyping();
  try {
    const res = await fetch(`${API}/api/chat`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ messages: chatHistory })
    });
    const data = await res.json();
    typing.remove();
    if (data.error) throw new Error(data.error);
    addMsg('bot', data.content);
    chatHistory.push({ role:'assistant', content:data.content });
    if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
  } catch(e) { typing.remove(); addMsg('bot', '오류: ' + e.message); }
  finally { send.disabled = false; }
}
function addMsg(role, c) {
  const msgs = document.getElementById('chat-msgs');
  const t = new Date().toLocaleTimeString('ko', { hour:'2-digit', minute:'2-digit' });
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="msg-bbl">${esc(c).replace(/\n/g,'<br>')}</div><div class="msg-ts">${t}</div>`;
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight; return div;
}
function addTyping() {
  const msgs = document.getElementById('chat-msgs');
  const div = document.createElement('div'); div.className = 'msg bot';
  div.innerHTML = '<div class="msg-bbl"><div class="typing"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight; return div;
}

/* ── 이벤트 바인딩 ── */
document.getElementById('chat-fab').onclick = () =>
  document.getElementById('chat-panel').classList.toggle('open');
document.getElementById('chat-send').onclick = sendChat;
document.getElementById('chat-inp').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});
document.querySelectorAll('.cnav').forEach(btn =>
  btn.addEventListener('click', () => selectCountry(btn.dataset.c))
);

/* ── 시작 ── */
setupCenter();
loadTypes().then(() => loadProducts('all')).then(() => loadDashboard());
</script>
